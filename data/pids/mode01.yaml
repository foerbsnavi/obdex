- pid: "00"
  mode: "01"
  bytes: 4
  unit: bitmap
  name:
    en: PIDs supported [01-20]
    de: Unterstützte PIDs [01-20]

- pid: "04"
  mode: "01"
  bytes: 1
  formula: "100/255 * A"
  unit: "%"
  range: [0, 100]
  name:
    en: Calculated engine load
    de: Berechnete Motorlast

- pid: "05"
  mode: "01"
  bytes: 1
  formula: "A - 40"
  unit: "°C"
  range: [-40, 215]
  name:
    en: Engine coolant temperature
    de: Kühlmitteltemperatur

- pid: "0B"
  mode: "01"
  bytes: 1
  formula: "A"
  unit: kPa
  range: [0, 255]
  name:
    en: Intake manifold absolute pressure
    de: Saugrohrdruck absolut

- pid: "0C"
  mode: "01"
  bytes: 2
  formula: "(256*A + B) / 4"
  unit: rpm
  range: [0, 16383.75]
  name:
    en: Engine RPM
    de: Motordrehzahl

- pid: "0D"
  mode: "01"
  bytes: 1
  formula: "A"
  unit: km/h
  range: [0, 255]
  name:
    en: Vehicle speed
    de: Fahrzeuggeschwindigkeit

- pid: "0F"
  mode: "01"
  bytes: 1
  formula: "A - 40"
  unit: "°C"
  range: [-40, 215]
  name:
    en: Intake air temperature
    de: Ansauglufttemperatur

- pid: "10"
  mode: "01"
  bytes: 2
  formula: "(256*A + B) / 100"
  unit: g/s
  range: [0, 655.35]
  name:
    en: Mass air flow rate
    de: Luftmassenstrom

- pid: "11"
  mode: "01"
  bytes: 1
  formula: "100/255 * A"
  unit: "%"
  range: [0, 100]
  name:
    en: Throttle position
    de: Drosselklappenstellung

- pid: "2F"
  mode: "01"
  bytes: 1
  formula: "100/255 * A"
  unit: "%"
  range: [0, 100]
  name:
    en: Fuel tank level
    de: Tankfüllstand

- pid: "5C"
  mode: "01"
  bytes: 1
  formula: "A - 40"
  unit: "°C"
  range: [-40, 215]
  name:
    en: Engine oil temperature
    de: Motoröltemperatur
