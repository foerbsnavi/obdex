- code: P1136
  scope: manufacturer
  category: powertrain
  manufacturer: vag
  applies_to:
    engines: ["1.8T-AGU", "1.8T-AEB", "1.8T-AWT", "1.8T-AUM"]
    years: [1996, 2006]
  title:
    en: Long Term Fuel Trim Additive Air Bank 1 System Too Lean
    de: Langzeit-Kraftstofftrim Zusatzluft Bank 1 zu mager
  description:
    en: The ECU is adding more fuel than the expected baseline to maintain stoichiometric mixture on bank 1, indicating unmetered air entering the intake or insufficient fuel delivery.
    de: Die Motorsteuerung muss mehr Kraftstoff zugeben als der erwartete Basiswert, um auf Bank 1 ein stöchiometrisches Gemisch zu halten. Hinweis auf Falschluft im Ansaugtrakt oder zu geringe Kraftstoffförderung.
  related_generic: [P0171]
  affected_components:
    - mass_air_flow_sensor
    - intake_manifold
    - fuel_pump
    - fuel_pressure_regulator
  common_causes:
    - id: maf_contamination
      likelihood: high
      label:
        en: MAF sensor contaminated
        de: Luftmassenmesser verschmutzt
    - id: intake_vacuum_leak
      likelihood: high
      label:
        en: Intake vacuum leak
        de: Falschluft im Ansaugtrakt
    - id: fuel_pressure_low
      likelihood: medium
      label:
        en: Fuel pressure below spec
        de: Kraftstoffdruck unter Sollwert
  repair:
    difficulty: medium
    diy_possible: true
    estimated_cost_eur: [50, 400]
    estimated_hours: [0.5, 3.0]
  flags:
    mil: true
    emissions_relevant: true
    drive_cycle_required: true
  sources:
    - https://wiki.ross-tech.com/wiki/index.php/01136
