        de: Sensorkalibrierung nach Austausch nicht durchgeführt
    - id: alignment_changed
      likelihood: medium
      label:
        en: Wheel alignment changed without calibration
        de: Achsvermessung ohne anschließende Kalibrierung
  repair:
