        de: Encoder-Motor defekt (Bürstenverschleiß oder festgefressen)
    - id: encoder_wiring_fault
      likelihood: medium
      label:
        en: Wiring or connector fault
        de: Verkabelungs- oder Steckerfehler
    - id: transfer_case_module_internal
