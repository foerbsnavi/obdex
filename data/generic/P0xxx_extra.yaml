  common_causes:
    - id: regulator_sluggish
      likelihood: high
      label:
        en: Regulator sluggish or partially blocked
        de: Regler träge oder teilweise blockiert
    - id: fuel_contamination
      likelihood: medium
      label:
        en: Fuel contamination
        de: Kraftstoffverunreinigung
  repair:
