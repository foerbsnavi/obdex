    - throttle_body
  common_causes:
    - id: tps_aging
      likelihood: high
      label:
        en: TPS contact aging
        de: Verschleiß der Sensorkontakte
    - id: dirty_throttle_body
      likelihood: medium
      label:
        en: Dirty or sticking throttle plate
        de: Verschmutzte oder klemmende Drosselklappe
  repair:
    difficulty: medium
    diy_possible: true
    estimated_cost_eur: [150, 700]
    estimated_hours: [0.5, 2.0]
