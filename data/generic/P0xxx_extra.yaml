        de: Schaltmagnetventil A defekt
    - id: clutch_slip
      likelihood: medium
      label:
        en: 1-2 clutch slipping
        de: 1-2 Kupplung rutscht
  repair:
    difficulty: hard
    diy_possible: false
    estimated_cost_eur: [400, 3000]
    estimated_hours: [2.0, 10.0]
  flags:
