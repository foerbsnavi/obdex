      likelihood: high
      label:
        en: Oxygen sensor bank 2 aged
        de: Lambdasonde Bank 2 gealtert
    - id: vacuum_leak_b2
      likelihood: medium
      label:
        en: Vacuum leak bank 2 side
        de: Falschluft auf Bank 2
  repair:
