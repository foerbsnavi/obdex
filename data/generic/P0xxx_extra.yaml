      likelihood: high
      label:
        en: Injector flow low
        de: Injektor mit zu geringer Durchflussmenge
    - id: low_compression
      likelihood: medium
      label:
        en: Low compression cylinder 2
        de: Zu geringe Kompression Zylinder 2
  repair:
