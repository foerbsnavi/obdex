        de: Mageres Abgas (Falschluft, zu niedriger Kraftstoffdruck)
    - id: shorted_to_ground
      likelihood: medium
      label:
        en: Signal wire shorted to ground
        de: Signalleitung gegen Masse kurzgeschlossen
    - id: failed_sensor
