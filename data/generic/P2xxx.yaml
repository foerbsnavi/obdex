        de: SCR-Katalysator gealtert oder vergiftet
    - id: nox_sensor_drift
      likelihood: medium
      label:
        en: NOx sensor drift
        de: NOx-Sensordrift
    - id: exhaust_leak_between_nox_sensors
      likelihood: low
      label:
