    - dpf_pressure_sensor_wiring
  common_causes:
    - id: connector_intermittent
      likelihood: high
      label:
        en: Connector intermittent
        de: Stecker mit Wackelkontakt
    - id: wiring_chafe
      likelihood: medium
      label:
        en: Wiring chafed against bracket
        de: Leitung an Halter gescheuert
  repair:
