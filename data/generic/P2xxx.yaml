      likelihood: high
      label:
        en: DPF pressure sensor failed
        de: DPF-Drucksensor defekt
    - id: dpf_pressure_hose_clogged
      likelihood: medium
      label:
        en: Sensor sample hoses clogged with soot
        de: Mess-Schläuche zum Sensor mit Ruß verstopft
  repair:
