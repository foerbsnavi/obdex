    - secondary_air_relay
  common_causes:
    - id: sai_relay_stuck_closed
      likelihood: high
      label:
        en: Relay stuck closed
        de: Relais hängt geschlossen
    - id: sai_driver_shorted
      likelihood: medium
      label:
        en: Driver stage shorted on
        de: Endstufe durchlegiert
  repair:
