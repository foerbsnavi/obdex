    - coolant_pump_wiring
  common_causes:
    - id: coolant_pump_coil_open
      likelihood: high
      label:
        en: Pump motor open
        de: Pumpenmotor unterbrochen
    - id: signal_wire_open
      likelihood: medium
      label:
        en: Drive line open
        de: Ansteuerleitung unterbrochen
  repair:
    difficulty: medium
    diy_possible: true
    estimated_cost_eur: [120, 700]
    estimated_hours: [0.5, 2.5]
