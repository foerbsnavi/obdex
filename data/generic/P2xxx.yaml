    - imrc_position_sensor_b2
    - imrc_wiring
  common_causes:
    - id: imrc_sensor_open
      likelihood: high
      label:
        en: Sensor element open
        de: Sensorelement unterbrochen
    - id: signal_wire_open
      likelihood: medium
      label:
        en: Signal wire open
        de: Signalleitung unterbrochen
  repair:
