        de: ECM ohne Spannung (Sicherung, Masse, Versorgung)
    - id: can_wiring_to_ecm
      likelihood: medium
      label:
        en: CAN wiring to ECM broken
        de: CAN-Leitung zum ECM unterbrochen
    - id: ecm_failed
