        de: Induktive Einkopplung von der Zündspulenprimärseite
    - id: reference_bias
      likelihood: medium
      label:
        en: Sense reference voltage biased
        de: Mess-Referenzspannung vorgespannt
  repair:
    difficulty: medium
    diy_possible: false
    estimated_cost_eur: [100, 700]
    estimated_hours: [0.5, 3]
  flags:
