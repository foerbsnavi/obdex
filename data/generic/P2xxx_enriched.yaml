      likelihood: high
      label:
        en: Control wire shorted to ground
        de: Steuerleitung gegen Masse kurzgeschlossen
  repair:
    difficulty: hard
    diy_possible: false
    estimated_cost_eur: [200, 1200]
    estimated_hours: [1.0, 4.0]
  flags:
    mil: true
