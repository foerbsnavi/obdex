        en: Downstream sensor failed stuck lean
        de: Nachsonde defekt, hängt mager
    - id: exhaust_leak_post_cat
      likelihood: medium
      label:
        en: Exhaust leak after catalyst
        de: Abgasleck nach Katalysator
