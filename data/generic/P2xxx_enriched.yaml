    de: Die Motorsteuerung erkennt eine Bordnetzspannung ausserhalb des Sollbereichs ohne nach hoch oder niedrig zu unterscheiden. Hinweis auf einen allgemeinen Ladefehler, der weiterer Diagnose bedarf.
