    de: 'NOx-Sensor an Bank 1 Sensor 2 reagiert zu langsam, wenn die NOx-Konzentration ansteigt (typisch bei reduzierter oder gestoppter SCR-Dosierung). Der Sensor ist gealtert oder seine Schutzkappe verstopft.'
