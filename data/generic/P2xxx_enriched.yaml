        de: Reduktionsmittelpumpe schwach oder defekt
    - id: adblue_filter_clogged
      likelihood: medium
      label:
        en: Reductant filter clogged with crystals
        de: Reduktionsmittelfilter mit Kristallen verstopft
    - id: adblue_line_leak
      likelihood: medium
      label:
