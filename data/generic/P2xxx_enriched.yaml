        de: Falschluft unter Last
    - id: fuel_pressure_low
      likelihood: medium
      label:
        en: Low fuel pressure / weak pump
        de: Niedriger Kraftstoffdruck / schwache Pumpe
    - id: maf_contaminated
      likelihood: medium
