    - fuel_injector
    - mass_air_flow_sensor
  common_causes:
    - id: fuel_pump_weak
      likelihood: high
      label:
        en: Fuel pump weak under load
        de: Kraftstoffpumpe schwach unter Last
    - id: fuel_filter_clogged
      likelihood: medium
      label:
        en: Fuel filter clogged
        de: Kraftstofffilter verstopft
    - id: maf_drift_low
      likelihood: medium
      label:
