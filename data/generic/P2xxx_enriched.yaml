    de: Die Gemischanpassung auf Bank 1 zeigt ausserhalb des Leerlaufs eine starke fette Korrektur. Die ECU muss Kraftstoff abziehen, um das Gemisch nahe der stoechiometrischen Zusammensetzung zu halten.
