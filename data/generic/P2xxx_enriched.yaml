        de: Bremslichtschalter hängt
    - id: pedal_sensor_drift
      likelihood: medium
      label:
        en: Accelerator pedal sensor drift
        de: Fahrpedalsensor driftet
  repair:
    difficulty: easy
    diy_possible: true
