    - accelerator_pedal_sensor
    - accelerator_pedal_wiring
  common_causes:
    - id: pedal_sensor_worn
      likelihood: high
      label:
        en: Pedal position sensor worn or contaminated
        de: Pedalwertgeber verschlissen oder verschmutzt
    - id: pedal_connector_corrosion
