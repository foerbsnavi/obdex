      label:
        en: Signal wire shorted to ground
        de: Signalleitung gegen Masse kurzgeschlossen
    - id: open_reference
      likelihood: medium
      label:
        en: Missing 5 V reference at the sensor
        de: Fehlende 5-V-Referenz am Sensor
  repair:
