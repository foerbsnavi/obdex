        de: Falschluft — Rissige Leitung, Dichtung oder Kurbelgehäuseentlüftung
    - id: maf_dirty
      likelihood: medium
      label:
        en: MAF sensor contaminated
        de: Luftmassenmesser verschmutzt
    - id: throttle_carbon_buildup
