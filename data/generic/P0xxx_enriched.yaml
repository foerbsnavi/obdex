    - tps_wiring
    - tps_connector
    - throttle_body
  common_causes:
    - id: tps_failure
      likelihood: high
      label:
        en: TPS worn or failed (dead spot in resistive track)
        de: TPS verschlissen oder defekt (toter Punkt auf der Widerstandsbahn)
    - id: tps_wiring
      likelihood: medium
      label:
        en: TPS wiring or connector fault
        de: TPS-Verkabelung oder Stecker fehlerhaft
    - id: tps_misadjusted
      likelihood: low
      label:
