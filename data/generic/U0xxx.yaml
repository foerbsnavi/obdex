  title:
    en: Lost Communication with Transfer Case Control Module
    de: Kommunikation mit Verteilergetriebe-Steuergerät verloren
  description:
    en: Same as U0100 but for the transfer case control module on 4WD/AWD vehicles. The driver typically loses the ability to switch between 2WD/4WD modes and the system may default to a fixed setting.
    de: Wie U0100, aber für das Verteilergetriebe-Steuergerät bei 4WD/AWD-Fahrzeugen. Der Fahrer kann typischerweise nicht mehr zwischen 2WD/4WD wechseln und das System fällt auf eine feste Einstellung zurück.
