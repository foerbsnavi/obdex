    de: Kommunikation mit Tür-Steuergerät verloren
  description:
    en: Same as U0100 but for a door control module (typically driver door). Power windows, mirror adjust, central locking and door-mounted speakers on the affected door may stop working.
    de: Wie U0100, aber für ein Tür-Steuergerät (typischerweise Fahrertür). Elektrische Fensterheber, Spiegelverstellung, Zentralverriegelung und Türlautsprecher der betroffenen Tür können ausfallen.
