    de: Ein Steuergerät kommuniziert mit dem Getriebesteuergerät, empfängt aber unplausible Daten — falsche Checksumme, eingefrorener Wert oder Wert außerhalb des Bereichs. Führt oft zum Getriebenotlauf.
