        de: Mechanische Störung am Sensor (loses Nebenaggregat)
    - id: knock_signal_short_to_voltage
      likelihood: medium
      label:
        en: Signal wire shorted to supply voltage
        de: Signalleitung gegen Versorgungsspannung kurzgeschlossen
