        de: Eine oder mehrere Glühkerzen unterbrochen
    - id: glow_plug_relay_failed
      likelihood: medium
      label:
        en: Glow plug relay failed
        de: Glühkerzenrelais defekt
    - id: glow_plug_wiring
      likelihood: low
      label:
        en: Wiring/harness damage
        de: Verkabelung/Kabelbaum beschädigt
