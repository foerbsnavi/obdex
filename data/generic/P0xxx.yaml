        de: Ölsteuerventil mechanisch hängend
    - id: oil_sludge
      likelihood: medium
      label:
        en: Sludge or debris in oil passages
        de: Verschlammung oder Späne in den Ölkanälen
    - id: low_oil_pressure
      likelihood: medium
      label:
