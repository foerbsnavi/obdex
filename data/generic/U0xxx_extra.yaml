      likelihood: high
      label:
        en: CAN-H and CAN-L shorted together
        de: CAN-H und CAN-L miteinander kurzgeschlossen
    - id: pinched_harness
      likelihood: medium
      label:
        en: Pinched harness behind a module
        de: Eingeklemmter Kabelbaum hinter einem Steuergerät
